name: ShoppingChacho Preise aktualisieren

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scraper ausfuehren
        run: python scraper/scrape.py
      - name: Preise committen
        run: |
          git config user.name "ShoppingChacho Bot"
          git config user.email "bot@shoppingchacho.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "Preise aktualisiert"
          git push
